version: '3.8'
services:
  app:
    build: ./backend
    container_name: ecommerce_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=mysql-db
      - DB_PORT=3306
      - DB_NAME=ecommerce_db
      - DB_USER=root
      - DB_PASS=123456
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - ecommerce_network
    volumes:
      - app_uploads:/app/uploads

  mysql-db:
    image: mysql:8.0
    container_name: ecommerce_mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=ecommerce_db
      - MYSQL_ROOT_PASSWORD=123456
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/database.sql:/docker-entrypoint-initdb.d/1-schema.sql
    networks:
      - ecommerce_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ecommerce_network:
    driver: bridge

volumes:
  db_data:
  app_uploads:
